name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble and unit-test both flavors
        run: >-
          ./gradlew
          assembleDemoDebug testDemoDebugUnitTest
          assembleProductionDebug testProductionDebugUnitTest
          --stacktrace
